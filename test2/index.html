<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>delimitar area move</title>
    <style>
        * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        }


        html, body {
            height: 100%;
            margin: 0px;
            overflow: hidden;
           
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        .pccontainer {
            position: relative;
            width: min(95vh, 90vw);
            z-index: 4;
            
        }
        .pccontainer img {
            height: 100%;
            display: block;
            width: 100%;;
            image-rendering: pixelated;
        }

        .screen {
            background-color: rgb(245, 138, 112);
            position: absolute;

            display: grid;
            grid-template-columns: 1fr 5fr 1fr;
            top: 8.7%;
            left: 16.3%;
            width: 67.4%;
            height: 52%;
            z-index: 1;
        }

        .janelas {
            position: absolute;
            z-index: 2;
            width: 60%;
            height: 65%;
            color: white;
            cursor: move;
            background-color: green;
        }

        #explorer {
            background-color: rgb(181, 210, 236);
        }

        .topo {
            background-color: blue;
            width: 100%;
            height: 10%;
        }
    </style>
</head>
<body>
    <div class="pccontainer">
        <div class="screen">
            <div  class="janelas" id="explorer">
               <div class="topo">
                explorer
               </div>
            </div>

            <div  class="janelas" id="folder">
               <div class="topo">
                explorer
               </div>
            </div>
                
                
        </div>
        <img src="computerazul.png" alt="">
    </div>
    <script src="delimitarjanelas.js"></script>
</body>
</html>
