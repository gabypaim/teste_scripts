<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rachando o cerebro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pccontainer">
        <main class="screen">
            
            <div class="icons">
                <div class="icon" id="mypc" data-id="mycomputer" data-barid="barmypc" data-name="My computer" onclick="abrir(this)">
                    <p>computericon</p>
                </div>
                <div class="icon" id="fold" data-id="folder" data-barid="barart" data-name="Folder" onclick="abrir(this)">
                    <p>folder</p>
                </div>
            </div>

            
            
            <div  class="janelas" id="mycomputer">
               <div class="topo">
                explorer
                   <div class="buttons">
                        <button class="minimizar" onclick="minimizar(this)">-</button>
                        <button class="fechar" onclick="fechar(this)">x</button>
                    </div>
               </div>
            </div>

            <div  class="janelas" id="folder">
               <div class="topo">
                folder
                    <div class="buttons">
                        <button class="minimizar" onclick="minimizar(this)">-</button>
                        <button class="fechar" onclick="fechar(this)">x</button>
                    </div>
               </div>
            </div>
        </main>

        <div class="barra">
            <div id="winxp">
                <div id=win><p>start;</p></div>
            </div>
            
            <div class="dia">
                dd/mm/yy
            </div>
        </div> 

        <img src="computerazul.png" alt="" class="pc-frame">
    </div>
    <script src="teste3.js"></script>
    <script src="delimitarjanelas.js"></script>
</body>
</html>
